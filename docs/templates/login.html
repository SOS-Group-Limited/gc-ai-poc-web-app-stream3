<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaw Asset Intelligence — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Montserrat', Arial, sans-serif;
    background: #1a1a1a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: absolute;
    top: -50%;
    right: -30%;
    width: 800px;
    height: 800px;
    background: radial-gradient(circle, rgba(177,43,53,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .login-card {
    background: #ffffff;
    width: 420px;
    padding: 48px;
    border-radius: 0;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    position: relative;
  }
  .logo-area {
    text-align: center;
    margin-bottom: 12px;
  }
  .logo-shield {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 56px;
    height: 56px;
    background: #b12b35;
    color: #fff;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -1px;
  }
  .logo-text {
    margin-top: 16px;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 3px;
    color: #1a1a1a;
    text-transform: uppercase;
  }
  .logo-subtitle {
    font-size: 13px;
    font-weight: 500;
    color: #5d6567;
    letter-spacing: 1.5px;
    margin-top: 4px;
  }
  .divider {
    height: 1px;
    background: #e3e3e3;
    margin: 32px 0;
  }
  .field-label {
    font-size: 11px;
    font-weight: 600;
    color: #9ca3af;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .password-input {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid #c1c5cb;
    border-radius: 2px;
    font-family: 'Montserrat', Arial, sans-serif;
    font-size: 14px;
    color: #1a1a1a;
    outline: none;
    transition: border-color 150ms ease;
  }
  .password-input:focus {
    border-color: #b12b35;
  }
  .password-input::placeholder {
    color: #c1c5cb;
  }
  .login-btn {
    width: 100%;
    padding: 14px 24px;
    background: #b12b35;
    color: #fff;
    border: none;
    border-radius: 2px;
    font-family: 'Montserrat', Arial, sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer;
    margin-top: 20px;
    transition: background 150ms ease;
  }
  .login-btn:hover {
    background: #9a141d;
  }
  .footer-text {
    text-align: center;
    margin-top: 32px;
    font-size: 11px;
    color: #9ca3af;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
  <div class="login-card">
    <div class="logo-area">
      <div class="logo-shield">G</div>
      <div class="logo-text">Gaw Capital</div>
      <div class="logo-subtitle">Asset Intelligence Platform</div>
    </div>
    <div class="divider"></div>
    <div class="field-label">Enter access code</div>
    <input type="password" class="password-input" placeholder="Access code">
    <button class="login-btn">Access Platform</button>
    <div class="footer-text">Gaw Capital Partners &middot; Hackathon 2026</div>
  </div>
</body>
</html>
